<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grumpy's Welcome Screen</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
}

.screen {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 37%, rgba(255,178,74,0.28), transparent 38%),
    radial-gradient(circle at 18% 22%, rgba(255,255,255,0.08), transparent 26%),
    linear-gradient(135deg, #050505, #16100a 50%, #050505);
}

.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.07) 45%, transparent 70%);
  animation: lightSweep 12s linear infinite;
  opacity: 0.45;
  z-index: 1;
}

@keyframes lightSweep {
  from { transform: translateX(-60%) skewX(-18deg); }
  to { transform: translateX(60%) skewX(-18deg); }
}

.content {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 95px;
  text-align: center;
}

.logo {
  width: 1000px;
  height: 1000px;
  object-fit: contain;
  margin-bottom: -120px;
  filter:
    drop-shadow(0 26px 34px rgba(0,0,0,0.9))
    drop-shadow(0 0 58px rgba(255,195,91,0.42));
  animation: logoIn 1.5s ease-out both, logoPulse 4s ease-in-out infinite 1.7s;
}

@keyframes logoIn {
  from { opacity: 0; transform: scale(0.86); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.012); }
}

.hours {
  margin-top: 0;
  font-size: 74px;
  font-weight: 950;
  color: #ffd58a;
  text-shadow:
    0 5px 0 #000,
    0 0 24px rgba(255,196,99,0.38);
  animation: fadeUp 1.2s ease-out both 0.6s;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

.theme-label {
  position: absolute;
  bottom: 54px;
  left: 0;
  right: 0;
  z-index: 12;
  text-align: center;
  font-size: 34px;
  font-weight: 950;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ffd58a;
  text-shadow:
    0 4px 0 #000,
    0 0 18px rgba(255,196,99,0.35);
}

.particle-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}

.particle {
  position: absolute;
  opacity: 0.8;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.normal .particle {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,211,138,0.55);
  box-shadow: 0 0 12px rgba(255,189,82,0.45);
  animation-name: floatUp;
}

@keyframes floatUp {
  from { transform: translateY(110vh); opacity: 0; }
  15% { opacity: 0.7; }
  to { transform: translateY(-15vh); opacity: 0; }
}

/* New Year */
.newyear {
  background:
    radial-gradient(circle at 50% 34%, rgba(255, 215, 110, 0.42), transparent 32%),
    radial-gradient(circle at 22% 22%, rgba(255, 255, 255, 0.10), transparent 18%),
    radial-gradient(circle at 78% 20%, rgba(255, 190, 80, 0.12), transparent 20%),
    radial-gradient(circle at 50% 110%, rgba(255, 170, 45, 0.16), transparent 35%),
    linear-gradient(135deg, #020202 0%, #15100a 45%, #050505 100%);
}

.newyear::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 30%, rgba(255, 220, 120, 0.0) 0 3%, rgba(255, 220, 120, 0.18) 4%, transparent 7%),
    radial-gradient(circle at 82% 28%, rgba(255, 255, 255, 0.0) 0 3%, rgba(255, 255, 255, 0.14) 4%, transparent 7%),
    radial-gradient(circle at 72% 68%, rgba(255, 190, 70, 0.0) 0 3%, rgba(255, 190, 70, 0.14) 4%, transparent 7%);
  animation: fireworksPulse 3.8s ease-in-out infinite alternate;
  opacity: 0.9;
}

@keyframes fireworksPulse {
  0% { opacity: 0.25; transform: scale(0.96); }
  45% { opacity: 0.85; transform: scale(1.02); }
  100% { opacity: 0.35; transform: scale(1.08); }
}

.newyear .particle {
  width: 8px;
  height: 16px;
  background: #ffd86b;
  border-radius: 2px;
  animation-name: confettiFall;
  box-shadow: 0 0 8px rgba(255,216,107,0.35);
}

/* Valentine's */
.valentine {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,55,120,0.28), transparent 38%),
    linear-gradient(135deg, #090206, #220714 55%, #050505);
}

.valentine .particle {
  font-size: 30px;
  color: #ff7aa8;
  animation-name: floatUp;
}

.valentine .particle::before { content: "♥"; }

/* St. Patrick's */
.stpatricks {
  background:
    radial-gradient(circle at 50% 37%, rgba(44,255,126,0.25), transparent 38%),
    linear-gradient(135deg, #021006, #062b13 55%, #020804);
}

.stpatricks .particle {
  font-size: 30px;
  color: #46ff8d;
  animation-name: floatUp;
}

.stpatricks .particle::before { content: "☘"; }

/* Spring */
.spring {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,225,145,0.24), transparent 38%),
    linear-gradient(135deg, #08110a, #1d2211 55%, #060606);
}

.spring .particle {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,216,244,0.75);
  animation-name: floatUp;
}

/* Patriotic */
.patriotic {
  background:
    linear-gradient(180deg, rgba(0,22,78,0.88), rgba(85,0,0,0.64)),
    linear-gradient(135deg, #020817, #110303);
}

.flag {
  display: none;
  position: absolute;
  inset: -8%;
  z-index: 1;
  opacity: 0.24;
  background:
    repeating-linear-gradient(
      to bottom,
      #b31942 0px,
      #b31942 54px,
      #ffffff 54px,
      #ffffff 108px
    );
  animation: flagWave 7s ease-in-out infinite alternate;
  transform-origin: center;
}

.patriotic .flag { display: block; }

.flag::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 42%;
  height: 54%;
  background:
    radial-gradient(circle, white 0 2px, transparent 3px) 0 0 / 42px 42px,
    #0a3161;
}

@keyframes flagWave {
  from { transform: scale(1.04) skewY(-1deg); filter: blur(0.2px); }
  to { transform: scale(1.08) skewY(1deg); filter: blur(1px); }
}

.patriotic .particle {
  font-size: 30px;
  color: white;
  animation-name: fireworkRise;
}

.patriotic .particle::before { content: "✦"; }

@keyframes fireworkRise {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  30% { opacity: 1; }
  65% { transform: translateY(35vh) scale(1.2); opacity: 1; }
  100% { transform: translateY(20vh) scale(0); opacity: 0; }
}

/* Halloween */
.halloween {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,107,31,0.28), transparent 38%),
    linear-gradient(135deg, #060105, #21102a 55%, #050505);
}

.halloween .particle {
  font-size: 34px;
  color: rgba(255,142,43,0.9);
  animation-name: batFly;
}

.halloween .particle::before { content: "🦇"; }

@keyframes batFly {
  from { transform: translateX(-20vw) translateY(0); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateX(120vw) translateY(-18vh); opacity: 0; }
}

.fog {
  display: none;
  position: absolute;
  left: -10%;
  right: -10%;
  bottom: -60px;
  height: 230px;
  z-index: 3;
  background:
    radial-gradient(circle at 20% 60%, rgba(255,255,255,0.16), transparent 30%),
    radial-gradient(circle at 55% 50%, rgba(255,255,255,0.13), transparent 32%),
    radial-gradient(circle at 85% 65%, rgba(255,255,255,0.15), transparent 34%);
  filter: blur(18px);
  animation: fogMove 12s ease-in-out infinite alternate;
}

.halloween .fog { display: block; }

@keyframes fogMove {
  from { transform: translateX(-4%); }
  to { transform: translateX(4%); }
}

/* Fall */
.fall {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,142,56,0.26), transparent 38%),
    linear-gradient(135deg, #090504, #241107 55%, #050505);
}

.fall .particle {
  font-size: 34px;
  animation-name: leafFall;
}

.fall .particle::before { content: "🍂"; }

@keyframes leafFall {
  from { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(115vh) rotate(280deg); opacity: 0; }
}

/* Christmas */
.christmas {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,45,45,0.22), transparent 36%),
    radial-gradient(circle at 25% 24%, rgba(0,255,120,0.15), transparent 25%),
    linear-gradient(135deg, #020705, #181006 55%, #050505);
}

.christmas .particle {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: white;
  animation-name: snowFall;
}

@keyframes snowFall {
  from { transform: translateY(-10vh); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(110vh); opacity: 0; }
}

.holiday-lights {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 65px;
  z-index: 11;
  background:
    radial-gradient(circle, #ff4040 0 8px, transparent 9px) 2% 20px / 90px 45px repeat-x,
    radial-gradient(circle, #44ff77 0 8px, transparent 9px) 6% 20px / 90px 45px repeat-x,
    radial-gradient(circle, #ffd34c 0 8px, transparent 9px) 10% 20px / 90px 45px repeat-x;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.55));
  animation: lightsPulse 1.8s ease-in-out infinite alternate;
}

.christmas .holiday-lights { display: block; }

@keyframes lightsPulse {
  from { opacity: 0.55; }
  to { opacity: 1; }
}

@keyframes confettiFall {
  from { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(115vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>
  <div id="screen" class="screen normal">
    <div class="flag"></div>
    <div class="holiday-lights"></div>
    <div class="fog"></div>
    <div id="particles" class="particle-layer"></div>

    <div class="content">
      <img class="logo" src="./grumpys-logo.png" alt="Grumpy's Logo">
      <div class="hours">Open Every Day at 11 AM</div>
    </div>

    <div class="theme-label" id="themeLabel"></div>
  </div>

<script>
const screen = document.getElementById("screen");
const particles = document.getElementById("particles");
const themeLabel = document.getElementById("themeLabel");

const now = new Date();
const month = now.getMonth() + 1;
const day = now.getDate();

function getTheme(month, day) {
  if ((month === 12 && day >= 31) || (month === 1 && day <= 2)) {
    return { className: "newyear", label: "Happy New Year from Grumpy's", particles: 90 };
  }

  if (month === 2 && day >= 10 && day <= 14) {
    return { className: "valentine", label: "Happy Valentine's Day", particles: 45 };
  }

  if (month === 3 && day >= 10 && day <= 17) {
    return { className: "stpatricks", label: "St. Patrick's Week at Grumpy's", particles: 50 };
  }

  if ((month === 3 && day >= 25) || (month === 4 && day <= 20)) {
    return { className: "spring", label: "Spring at Grumpy's", particles: 45 };
  }

  if (month === 5 && day >= 24 && day <= 31) {
    return { className: "patriotic", label: "Memorial Day Weekend at Grumpy's", particles: 55 };
  }

  if (month === 7 && day >= 1 && day <= 6) {
    return { className: "patriotic", label: "Happy Fourth of July from Grumpy's", particles: 70 };
  }

  if (month === 10 && day >= 20 && day <= 31) {
    return { className: "halloween", label: "Halloween at Grumpy's", particles: 18 };
  }

  if (month === 11 && day >= 1 && day <= 30) {
    return { className: "fall", label: "Fall at Grumpy's", particles: 35 };
  }

  if (month === 12 && day >= 1 && day <= 30) {
    return { className: "christmas", label: "Merry Christmas from Grumpy's", particles: 95 };
  }

  return { className: "normal", label: "", particles: 45 };
}

const theme = getTheme(month, day);
screen.className = "screen " + theme.className;
themeLabel.textContent = theme.label;

function makeParticles(theme) {
  particles.innerHTML = "";

  for (let i = 0; i < theme.particles; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (6 + Math.random() * 12) + "s";
    p.style.animationDelay = (-Math.random() * 12) + "s";

    if (theme.className === "newyear") {
      p.style.background = ["#ffd86b", "#fff3c4", "#ffffff", "#c99b36"][Math.floor(Math.random() * 4)];
      p.style.width = (5 + Math.random() * 7) + "px";
      p.style.height = (10 + Math.random() * 18) + "px";
      p.style.opacity = 0.55 + Math.random() * 0.35;
    }

    if (theme.className === "patriotic") {
      p.style.color = ["#ffffff", "#ff4c4c", "#62a8ff"][Math.floor(Math.random() * 3)];
    }

    if (theme.className === "christmas") {
      p.style.animationDuration = (8 + Math.random() * 14) + "s";
    }

    particles.appendChild(p);
  }
}

makeParticles(theme);
</script>
</body>
</html>
