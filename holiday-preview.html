<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grumpy's Holiday Preview</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: Arial, Helvetica, sans-serif;
  color: white;
}

.screen {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 37%, rgba(255,178,74,0.28), transparent 38%),
    radial-gradient(circle at 18% 22%, rgba(255,255,255,0.08), transparent 26%),
    linear-gradient(135deg, #050505, #16100a 50%, #050505);
  transition: background 0.6s ease;
}

.screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.07) 45%, transparent 70%);
  animation: lightSweep 12s linear infinite;
  opacity: 0.45;
  z-index: 1;
}

@keyframes lightSweep {
  from { transform: translateX(-60%) skewX(-18deg); }
  to { transform: translateX(60%) skewX(-18deg); }
}

.content {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-bottom: 95px;
  text-align: center;
}

.logo {
  width: 1000px;
  height: 1000px;
  object-fit: contain;
  margin-bottom: -120px;
  filter:
    drop-shadow(0 26px 34px rgba(0,0,0,0.9))
    drop-shadow(0 0 58px rgba(255,195,91,0.42));
  animation: logoPulse 4s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.012); }
}

.hours {
  margin-top: 0;
  font-size: 74px;
  font-weight: 950;
  color: #ffd58a;
  text-shadow:
    0 5px 0 #000,
    0 0 24px rgba(255,196,99,0.38);
}

.theme-label {
  position: absolute;
  bottom: 104px;
  left: 0;
  right: 0;
  z-index: 12;
  text-align: center;
  font-size: 34px;
  font-weight: 950;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #ffd58a;
  text-shadow:
    0 4px 0 #000,
    0 0 18px rgba(255,196,99,0.35);
}

.controls {
  position: absolute;
  left: 30px;
  right: 30px;
  bottom: 24px;
  z-index: 30;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.controls button {
  border: 1px solid rgba(255,255,255,0.24);
  background: rgba(0,0,0,0.62);
  color: white;
  font-size: 17px;
  font-weight: 800;
  padding: 11px 16px;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 5px 14px rgba(0,0,0,0.35);
}

.controls button:hover {
  background: rgba(255,213,138,0.24);
}

.controls button.active {
  background: #ffd58a;
  color: #111;
}

.particle-layer {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}

.particle {
  position: absolute;
  opacity: 0.8;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.normal .particle {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,211,138,0.55);
  box-shadow: 0 0 12px rgba(255,189,82,0.45);
  animation-name: floatUp;
}

@keyframes floatUp {
  from { transform: translateY(110vh); opacity: 0; }
  15% { opacity: 0.7; }
  to { transform: translateY(-15vh); opacity: 0; }
}

/* New Year */
.newyear {
  background:
    radial-gradient(circle at 50% 34%, rgba(255, 215, 110, 0.42), transparent 32%),
    radial-gradient(circle at 22% 22%, rgba(255, 255, 255, 0.10), transparent 18%),
    radial-gradient(circle at 78% 20%, rgba(255, 190, 80, 0.12), transparent 20%),
    radial-gradient(circle at 50% 110%, rgba(255, 170, 45, 0.16), transparent 35%),
    linear-gradient(135deg, #020202 0%, #15100a 45%, #050505 100%);
}

.newyear::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 30%, rgba(255, 220, 120, 0.0) 0 3%, rgba(255, 220, 120, 0.18) 4%, transparent 7%),
    radial-gradient(circle at 82% 28%, rgba(255, 255, 255, 0.0) 0 3%, rgba(255, 255, 255, 0.14) 4%, transparent 7%),
    radial-gradient(circle at 72% 68%, rgba(255, 190, 70, 0.0) 0 3%, rgba(255, 190, 70, 0.14) 4%, transparent 7%);
  animation: fireworksPulse 3.8s ease-in-out infinite alternate;
  opacity: 0.9;
}

@keyframes fireworksPulse {
  0% { opacity: 0.25; transform: scale(0.96); }
  45% { opacity: 0.85; transform: scale(1.02); }
  100% { opacity: 0.35; transform: scale(1.08); }
}

.newyear .particle {
  width: 8px;
  height: 16px;
  background: #ffd86b;
  border-radius: 2px;
  animation-name: confettiFall;
  box-shadow: 0 0 8px rgba(255,216,107,0.35);
}

/* New Year's clock */
.midnight-clock {
  display: none;
  position: absolute;
  left: 50%;
  top: 42%;
  width: 780px;
  height: 780px;
  transform: translate(-50%, -50%);
  z-index: 1;
  opacity: 0.18;
  pointer-events: none;
}

.newyear .midnight-clock {
  display: block;
}

.clock-face {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 6px solid rgba(255, 214, 120, 0.35);
  box-shadow:
    0 0 55px rgba(255, 190, 80, 0.18),
    inset 0 0 60px rgba(255, 190, 80, 0.10);
}

.clock-face::before {
  content: "";
  position: absolute;
  inset: 38px;
  border-radius: 50%;
  border: 2px solid rgba(255, 214, 120, 0.18);
}

.clock-face::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    linear-gradient(0deg, transparent 48%, rgba(255,214,120,0.35) 49%, rgba(255,214,120,0.35) 51%, transparent 52%),
    linear-gradient(30deg, transparent 49%, rgba(255,214,120,0.18) 50%, transparent 51%),
    linear-gradient(60deg, transparent 49%, rgba(255,214,120,0.18) 50%, transparent 51%),
    linear-gradient(90deg, transparent 48%, rgba(255,214,120,0.35) 49%, rgba(255,214,120,0.35) 51%, transparent 52%),
    linear-gradient(120deg, transparent 49%, rgba(255,214,120,0.18) 50%, transparent 51%),
    linear-gradient(150deg, transparent 49%, rgba(255,214,120,0.18) 50%, transparent 51%);
  opacity: 0.32;
}

.clock-hand {
  position: absolute;
  left: 50%;
  bottom: 50%;
  transform-origin: bottom center;
  border-radius: 999px;
  background: rgba(255, 224, 150, 0.5);
  box-shadow: 0 0 14px rgba(255, 224, 150, 0.35);
}

.hour-hand {
  width: 14px;
  height: 185px;
  transform: translateX(-50%) rotate(0deg);
}

.minute-hand {
  width: 8px;
  height: 285px;
  transform: translateX(-50%) rotate(0deg);
}

/* New Year's fireworks */
.fireworks-layer {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

.newyear .fireworks-layer {
  display: block;
}

.firework {
  position: absolute;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  opacity: 0.75;
  animation: fireworkPop 3.2s ease-in-out infinite;
}

.firework::before,
.firework::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    linear-gradient(0deg, transparent 46%, rgba(255, 224, 145, 0.95) 49%, transparent 52%),
    linear-gradient(20deg, transparent 47%, rgba(255, 255, 255, 0.75) 50%, transparent 53%),
    linear-gradient(40deg, transparent 47%, rgba(255, 204, 88, 0.9) 50%, transparent 53%),
    linear-gradient(60deg, transparent 47%, rgba(255, 255, 255, 0.65) 50%, transparent 53%),
    linear-gradient(80deg, transparent 47%, rgba(255, 204, 88, 0.85) 50%, transparent 53%),
    linear-gradient(100deg, transparent 47%, rgba(255, 255, 255, 0.7) 50%, transparent 53%),
    linear-gradient(120deg, transparent 47%, rgba(255, 204, 88, 0.85) 50%, transparent 53%),
    linear-gradient(140deg, transparent 47%, rgba(255, 255, 255, 0.65) 50%, transparent 53%),
    linear-gradient(160deg, transparent 47%, rgba(255, 204, 88, 0.9) 50%, transparent 53%);
  filter: drop-shadow(0 0 12px rgba(255, 214, 120, 0.65));
}

.firework::after {
  transform: rotate(10deg) scale(0.72);
  opacity: 0.65;
}

.firework-left {
  left: 7%;
  top: 21%;
  animation-delay: 0s;
}

.firework-right {
  right: 7%;
  top: 18%;
  animation-delay: 1.1s;
  transform: scale(0.9);
}

.firework-small {
  right: 16%;
  bottom: 24%;
  width: 185px;
  height: 185px;
  animation-delay: 2.1s;
  opacity: 0.55;
}

@keyframes fireworkPop {
  0% { transform: scale(0.25); opacity: 0; }
  28% { opacity: 0.85; }
  55% { transform: scale(1); opacity: 0.55; }
  100% { transform: scale(1.18); opacity: 0; }
}

/* New Year's streamers */
.streamers-layer {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.newyear .streamers-layer {
  display: block;
}

.streamer {
  position: absolute;
  width: 170px;
  height: 10px;
  border-radius: 999px;
  opacity: 0.72;
  background: linear-gradient(90deg, transparent, #ffd86b, #fff3c4, transparent);
  box-shadow: 0 0 12px rgba(255, 216, 107, 0.35);
  animation: streamerFly linear infinite;
}

@keyframes streamerFly {
  from {
    transform: translateX(-25vw) translateY(0) rotate(var(--rot));
    opacity: 0;
  }
  12% { opacity: 0.85; }
  88% { opacity: 0.75; }
  to {
    transform: translateX(130vw) translateY(var(--drop)) rotate(calc(var(--rot) + 70deg));
    opacity: 0;
  }
}

/* Valentine's */
.valentine {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,55,120,0.28), transparent 38%),
    linear-gradient(135deg, #090206, #220714 55%, #050505);
}

.valentine .particle {
  font-size: 30px;
  color: #ff7aa8;
  animation-name: floatUp;
}

.valentine .particle::before { content: "♥"; }

/* St. Patrick's */
.stpatricks {
  background:
    radial-gradient(circle at 50% 37%, rgba(44,255,126,0.25), transparent 38%),
    linear-gradient(135deg, #021006, #062b13 55%, #020804);
}

.stpatricks .particle {
  font-size: 30px;
  color: #46ff8d;
  animation-name: floatUp;
}

.stpatricks .particle::before { content: "☘"; }

/* Spring */
.spring {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,225,145,0.24), transparent 38%),
    linear-gradient(135deg, #08110a, #1d2211 55%, #060606);
}

.spring .particle {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255,216,244,0.75);
  animation-name: floatUp;
}

/* Patriotic */
.patriotic {
  background:
    linear-gradient(180deg, rgba(0,22,78,0.88), rgba(85,0,0,0.64)),
    linear-gradient(135deg, #020817, #110303);
}

.flag {
  display: none;
  position: absolute;
  inset: -8%;
  z-index: 1;
  opacity: 0.24;
  background:
    repeating-linear-gradient(
      to bottom,
      #b31942 0px,
      #b31942 54px,
      #ffffff 54px,
      #ffffff 108px
    );
  animation: flagWave 7s ease-in-out infinite alternate;
  transform-origin: center;
}

.patriotic .flag { display: block; }

.flag::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 42%;
  height: 54%;
  background:
    radial-gradient(circle, white 0 2px, transparent 3px) 0 0 / 42px 42px,
    #0a3161;
}

@keyframes flagWave {
  from { transform: scale(1.04) skewY(-1deg); filter: blur(0.2px); }
  to { transform: scale(1.08) skewY(1deg); filter: blur(1px); }
}

.patriotic .particle {
  font-size: 30px;
  color: white;
  animation-name: fireworkRise;
}

.patriotic .particle::before { content: "✦"; }

@keyframes fireworkRise {
  0% { transform: translateY(100vh) scale(0.4); opacity: 0; }
  30% { opacity: 1; }
  65% { transform: translateY(35vh) scale(1.2); opacity: 1; }
  100% { transform: translateY(20vh) scale(0); opacity: 0; }
}

/* Halloween */
.halloween {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,107,31,0.28), transparent 38%),
    linear-gradient(135deg, #060105, #21102a 55%, #050505);
}

.halloween .particle {
  font-size: 34px;
  color: rgba(255,142,43,0.9);
  animation-name: batFly;
}

.halloween .particle::before { content: "🦇"; }

@keyframes batFly {
  from { transform: translateX(-20vw) translateY(0); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateX(120vw) translateY(-18vh); opacity: 0; }
}

.fog {
  display: none;
  position: absolute;
  left: -10%;
  right: -10%;
  bottom: -60px;
  height: 230px;
  z-index: 3;
  background:
    radial-gradient(circle at 20% 60%, rgba(255,255,255,0.16), transparent 30%),
    radial-gradient(circle at 55% 50%, rgba(255,255,255,0.13), transparent 32%),
    radial-gradient(circle at 85% 65%, rgba(255,255,255,0.15), transparent 34%);
  filter: blur(18px);
  animation: fogMove 12s ease-in-out infinite alternate;
}

.halloween .fog { display: block; }

@keyframes fogMove {
  from { transform: translateX(-4%); }
  to { transform: translateX(4%); }
}

/* Fall */
.fall {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,142,56,0.26), transparent 38%),
    linear-gradient(135deg, #090504, #241107 55%, #050505);
}

.fall .particle {
  font-size: 34px;
  animation-name: leafFall;
}

.fall .particle::before { content: "🍂"; }

@keyframes leafFall {
  from { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(115vh) rotate(280deg); opacity: 0; }
}

/* Christmas */
.christmas {
  background:
    radial-gradient(circle at 50% 37%, rgba(255,45,45,0.22), transparent 36%),
    radial-gradient(circle at 25% 24%, rgba(0,255,120,0.15), transparent 25%),
    linear-gradient(135deg, #020705, #181006 55%, #050505);
}

.christmas .particle {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: white;
  animation-name: snowFall;
}

@keyframes snowFall {
  from { transform: translateY(-10vh); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(110vh); opacity: 0; }
}

.holiday-lights {
  display: none;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 65px;
  z-index: 11;
  background:
    radial-gradient(circle, #ff4040 0 8px, transparent 9px) 2% 20px / 90px 45px repeat-x,
    radial-gradient(circle, #44ff77 0 8px, transparent 9px) 6% 20px / 90px 45px repeat-x,
    radial-gradient(circle, #ffd34c 0 8px, transparent 9px) 10% 20px / 90px 45px repeat-x;
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.55));
  animation: lightsPulse 1.8s ease-in-out infinite alternate;
}

.christmas .holiday-lights { display: block; }

@keyframes lightsPulse {
  from { opacity: 0.55; }
  to { opacity: 1; }
}

@keyframes confettiFall {
  from { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
  15% { opacity: 0.9; }
  to { transform: translateY(115vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>
  <div id="screen" class="screen normal">
    <div class="flag"></div>
    <div class="holiday-lights"></div>
    <div class="fog"></div>

    <div class="midnight-clock">
      <div class="clock-face"></div>
      <div class="clock-hand hour-hand"></div>
      <div class="clock-hand minute-hand"></div>
    </div>

    <div class="fireworks-layer">
      <div class="firework firework-left"></div>
      <div class="firework firework-right"></div>
      <div class="firework firework-small"></div>
    </div>

    <div class="streamers-layer" id="streamers"></div>
    <div id="particles" class="particle-layer"></div>

    <div class="content">
      <img class="logo" src="./grumpys-logo.png" alt="Grumpy's Logo">
      <div class="hours">Open Every Day at 11 AM</div>
    </div>

    <div class="theme-label" id="themeLabel"></div>
    <div class="controls" id="controls"></div>
  </div>

<script>
const screen = document.getElementById("screen");
const particles = document.getElementById("particles");
const themeLabel = document.getElementById("themeLabel");
const controls = document.getElementById("controls");

const themes = {
  normal: {
    button: "Normal",
    className: "normal",
    label: "",
    particles: 45
  },
  newyear: {
    button: "New Year",
    className: "newyear",
    label: "Happy New Year from Grumpy's",
    particles: 55
  },
  valentine: {
    button: "Valentine's",
    className: "valentine",
    label: "Happy Valentine's Day",
    particles: 45
  },
  stpatricks: {
    button: "St. Patrick's",
    className: "stpatricks",
    label: "St. Patrick's Week at Grumpy's",
    particles: 50
  },
  spring: {
    button: "Spring",
    className: "spring",
    label: "Spring at Grumpy's",
    particles: 45
  },
  memorial: {
    button: "Memorial Day",
    className: "patriotic",
    label: "Memorial Day Weekend at Grumpy's",
    particles: 55
  },
  july4: {
    button: "Fourth of July",
    className: "patriotic",
    label: "Happy Fourth of July from Grumpy's",
    particles: 70
  },
  halloween: {
    button: "Halloween",
    className: "halloween",
    label: "Halloween at Grumpy's",
    particles: 18
  },
  thanksgiving: {
    button: "Thanksgiving/Fall",
    className: "fall",
    label: "Fall at Grumpy's",
    particles: 35
  },
  christmas: {
    button: "Christmas",
    className: "christmas",
    label: "Merry Christmas from Grumpy's",
    particles: 95
  }
};

function setTheme(key) {
  const theme = themes[key];

  screen.className = "screen " + theme.className;
  themeLabel.textContent = theme.label;

  document.querySelectorAll(".controls button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.theme === key);
  });

  makeParticles(theme);
  makeStreamers(theme);
}

function makeParticles(theme) {
  particles.innerHTML = "";

  for (let i = 0; i < theme.particles; i++) {
    const p = document.createElement("div");
    p.className = "particle";

    p.style.left = Math.random() * 100 + "vw";
    p.style.top = Math.random() * 100 + "vh";
    p.style.animationDuration = (6 + Math.random() * 12) + "s";
    p.style.animationDelay = (-Math.random() * 12) + "s";

    if (theme.className === "newyear") {
      p.style.background = ["#ffd86b", "#fff3c4", "#ffffff", "#c99b36"][Math.floor(Math.random() * 4)];
      p.style.width = (4 + Math.random() * 6) + "px";
      p.style.height = (8 + Math.random() * 14) + "px";
      p.style.opacity = 0.38 + Math.random() * 0.28;
    }

    if (theme.className === "patriotic") {
      p.style.color = ["#ffffff", "#ff4c4c", "#62a8ff"][Math.floor(Math.random() * 3)];
    }

    if (theme.className === "christmas") {
      p.style.animationDuration = (8 + Math.random() * 14) + "s";
    }

    particles.appendChild(p);
  }
}

function makeStreamers(theme) {
  const streamers = document.getElementById("streamers");
  if (!streamers) return;

  streamers.innerHTML = "";

  if (theme.className !== "newyear") return;

  const colors = [
    "linear-gradient(90deg, transparent, #ffd86b, #fff3c4, transparent)",
    "linear-gradient(90deg, transparent, #ffffff, #ffd86b, transparent)",
    "linear-gradient(90deg, transparent, #c99b36, #fff3c4, transparent)"
  ];

  for (let i = 0; i < 16; i++) {
    const s = document.createElement("div");
    s.className = "streamer";

    s.style.top = Math.random() * 95 + "vh";
    s.style.left = "-20vw";
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDuration = (7 + Math.random() * 8) + "s";
    s.style.animationDelay = (-Math.random() * 10) + "s";
    s.style.setProperty("--rot", (-35 + Math.random() * 70) + "deg");
    s.style.setProperty("--drop", (-130 + Math.random() * 260) + "px");

    streamers.appendChild(s);
  }
}

function makeButtons() {
  Object.keys(themes).forEach(key => {
    const btn = document.createElement("button");
    btn.textContent = themes[key].button;
    btn.dataset.theme = key;
    btn.onclick = () => setTheme(key);
    controls.appendChild(btn);
  });
}

makeButtons();
setTheme("normal");
</script>
</body>
</html>
